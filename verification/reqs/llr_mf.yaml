# Low-Level Requirements (LLR) for Metafont
# Schema:
# - id: LLR-MF-SEC-XXX
#   web_section: <integer>
#   description: "Requirement description"
#   parent_hlr:
#     - HLR-ID-XXX
- id: LLR-MF-SEC-001
  web_section: 1
  description: "Metafont shall be initialized and identify itself as MF84."
  parent_hlr: []
- id: LLR-MF-SEC-002
  web_section: 2
  description: "Metafont shall convert all input text into an internal eight-bit code (standard ASCII)."
  parent_hlr: []
- id: LLR-MF-SEC-003
  web_section: 3
  description: "Metafont shall implement basic I/O operations for text (alpha_file) and bytes (byte_file), including opening, closing, and testing for end-of-file."
  parent_hlr: []
- id: LLR-MF-SEC-004
  web_section: 4
  description: "Metafont shall implement string handling using a string pool (str_pool) and a starting index array (str_start)."
  parent_hlr: []
- id: LLR-MF-SEC-005
  web_section: 5
  description: "Metafont shall implement output redirection to the terminal, log file, or other destinations based on the 'selector' variable."
  parent_hlr: []
- id: LLR-MF-SEC-006
  web_section: 6
  description: "Metafont shall implement error reporting and four interaction modes: batch, nonstop, scroll, and error_stop."
  parent_hlr: []
- id: LLR-MF-SEC-007
  web_section: 7
  description: "Metafont shall implement fixed-point arithmetic using scaled integers to ensure identical output across different computers."
  parent_hlr: []
- id: LLR-MF-SEC-008
  web_section: 8
  description: "Metafont shall implement algebraic and transcendental functions (e.g., square root, sine, cosine) using integer-based iterative methods without relying on system real arithmetic."
  parent_hlr: []
- id: LLR-MF-SEC-009
  web_section: 9
  description: "Metafont shall implement packed data structures using the 'memory_word' type to optimize storage."
  parent_hlr: []
- id: LLR-MF-SEC-010
  web_section: 10
  description: "Metafont shall implement dynamic memory allocation using a large 'mem' array to manage blocks of nodes."
  parent_hlr: []
- id: LLR-MF-SEC-011
  web_section: 11
  description: "Metafont shall define the memory layout for static and dynamic nodes, including reserved locations for special constants like null pen coordinates."
  parent_hlr: []
- id: LLR-MF-SEC-012
  web_section: 12
  description: "Metafont shall define symbolic names for internal command codes representing various commands and expression types."
  parent_hlr: []
- id: LLR-MF-SEC-013
  web_section: 13
  description: "Metafont shall implement a hash table using coalesced lists to store and retrieve symbolic tokens efficiently."
  parent_hlr: []
- id: LLR-MF-SEC-014
  web_section: 14
  description: "Metafont shall implement data structures for tokens, representing symbolic, numeric, string, macro parameter, or capsule types."
  parent_hlr: []
- id: LLR-MF-SEC-015
  web_section: 15
  description: "Metafont shall implement data structures for variables, supporting simple, array, and record-like structures using two-word value nodes."
  parent_hlr: []
- id: LLR-MF-SEC-016
  web_section: 16
  description: "Metafont shall implement a save stack to allow for saving and restoring equivalents during nested group processing."
  parent_hlr: []
- id: LLR-MF-SEC-017
  web_section: 17
  description: "Metafont shall implement data structures for paths, representing knots and control points for cubic spline curves."
  parent_hlr: []
- id: LLR-MF-SEC-018
  web_section: 18
  description: "Metafont shall implement a procedure for choosing angles and control points for splines when not explicitly specified by the user."
  parent_hlr: []
- id: LLR-MF-SEC-019
  web_section: 19
  description: "Metafont shall implement subroutines for computing discrete approximations to cubic spline curves using bisection methods."
  parent_hlr: []
- id: LLR-MF-SEC-020
  web_section: 20
  description: "Metafont shall implement edge structures to represent the pixels of a graphic by storing nonzero edge weights for each row."
  parent_hlr: []
