  description: "The TeX system shall provide procedures for packaging material into horizontal and vertical boxes, including dimension and glue calculations."
  category: Functional
  source: "The TeXbook, Chapters 12, 21"
- id: HLR-MF-FUN-006
  description: "The Metafont system shall provide basic infrastructure services including initialization, character set conversion, file I/O, and string management."
  category: Functional
  source: "The Metafontbook, Appendix B"
