# High-Level Requirements (HLR)
# Schema:
# - id: HLR-ID-XXX
#   description: "Requirement description"
#   category: [Functional|Output|Resource]
#   source: "Source reference (e.g., The TeXbook, p. X)"
- id: HLR-TEX-FUN-001
  description: "The TeX system shall implement the line breaking algorithm as specified in The TeXbook, Part 14."
  category: Functional
  source: "The TeXbook, p. 94"
- id: HLR-TEX-OUT-001
  description: "The TeX system shall produce a Device Independent (DVI) file as its primary output format."
  category: Output
  source: "The TeXbook, p. 23"
- id: HLR-TEX-FUN-013
  description: "The TeX system shall read and process TeX Font Metric (TFM) files to obtain character dimensions and lig/kern data."
  category: Functional
  source: "The TeXbook, p. 20"
- id: HLR-TEX-RES-001
  description: "The TeX system shall manage memory dynamically using the WEB memory-word structure to store data and instructions."
  category: Resource
  source: "The TeXbook, Appendix B"
- id: HLR-TEX-FUN-002
  description: "The TeX system shall perform platform-independent arithmetic using scaled integers to ensure identical output across different computers."
  category: Functional
  source: "The TeXbook, p. 38"
- id: HLR-TEX-FUN-003
  description: "The TeX system shall implement mathematical typesetting, including the placement of symbols, subscripts, and superscripts in different styles."
  category: Functional
  source: "The TeXbook, Chapters 16-19"
- id: HLR-TEX-FUN-004
  description: "The TeX system shall implement Liang's hyphenation algorithm using patterns to find potential hyphenation points in words."
  category: Functional
  source: "The TeXbook, Appendix H"
- id: HLR-TEX-FUN-005
  description: "The TeX system shall implement the page building algorithm to determine optimal page breaks and manage insertions."
  category: Functional
  source: "The TeXbook, Chapter 15"
- id: HLR-TEX-FUN-006
  description: "The TeX system shall implement a macro expansion and language parsing engine to process user-defined commands and primitives."
  category: Functional
  source: "The TeXbook, Chapters 7-13, 20, 24-26"
- id: HLR-MF-FUN-001
  description: "The Metafont system shall maintain and solve systems of linear equations between numeric variables."
  category: Functional
  source: "The Metafontbook, Chapter 14"
- id: HLR-MF-FUN-002
  description: "The Metafont system shall implement cubic spline calculations to define smooth curves through a set of specified points."
  category: Functional
  source: "The Metafontbook, Chapter 14"
- id: HLR-MF-FUN-003
  description: "The Metafont system shall implement rasterization and path filling to convert continuous curves into digitized bitmaps."
  category: Functional
  source: "The Metafontbook, Chapter 24"
- id: HLR-MF-FUN-004
  description: "The Metafont system shall perform platform-independent arithmetic using scaled integers to ensure identical output across different computers."
  category: Functional
  source: "The Metafontbook, p. 50"
- id: HLR-MF-FUN-005
  description: "The Metafont system shall implement a macro expansion and language parsing engine to process user-defined commands and primitives."
  category: Functional
  source: "The Metafontbook, Chapters 7-13, 17-20, 25-26"
- id: HLR-MF-OUT-001
  description: "The Metafont system shall produce a Generic Font (GF) file as its primary graphical output format."
  category: Output
  source: "The Metafontbook, p. 11"
- id: HLR-MF-OUT-002
  description: "The Metafont system shall produce a TeX Font Metric (TFM) file containing character dimensions and lig/kern data."
  category: Output
  source: "The Metafontbook, p. 11"
- id: HLR-MF-RES-001
  description: "The Metafont system shall manage memory dynamically using the WEB memory-word structure to store data and instructions."
  category: Resource
  source: "The Metafontbook, Appendix B"
- id: HLR-TEX-FUN-007
  description: "The TeX system shall provide basic infrastructure services including initialization, character set conversion, file I/O, and string management."
  category: Functional
  source: "The TeXbook, Appendix B"
- id: HLR-TEX-FUN-008
  description: "The TeX system shall implement comprehensive error reporting, diagnostic displays, and debugging aids."
  category: Functional
  source: "The TeXbook, Chapter 27"
- id: HLR-TEX-FUN-009
  description: "The TeX system shall maintain global state through the semantic nest and the table of equivalents to manage nested modes and scoping."
  category: Functional
  source: "The TeXbook, Chapters 13, 24"
