# TRIP Torture Test Configuration for TeX
test_id: "TC-TEX-TRIP-001"
description: "TeX TRIP torture test"
source_web: "dist/tex/tex.web"
change_file: "verification/tests/trip/trip.ch"
setup_files:
  - "dist/tex/trip.tfm"
  - "dist/tex/trip.tex"
stages:
  - id: "init"
    description: "Initial run to generate trip.fmt"
    test_input_data: "\n\\input trip\n"
    expected_outputs:
      log: "dist/tex/tripin.log"
      terminal: "dist/tex/tripin.fot"
  - id: "main"
    description: "Main torture test run"
    test_input_data: " &trip  trip \n"
    expected_outputs:
      log: "dist/tex/trip.log"
      dvi: "dist/tex/trip.dvi"
      tfm: "dist/tex/trip.tfm"
      terminal: "dist/tex/trip.fot"
      pl: "dist/tex/trip.pl"
      typ: "dist/tex/trip.typ"
      tripos: "dist/tex/tripos.tex"
settings:
  tolerance: 0.1
